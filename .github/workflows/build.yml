name: Build iOS Mod Menu
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project Source
        uses: actions/checkout@v4

      - name: Setup Theos (toolchain + SDK + ldid)
        uses: Randomblock1/theos-action@v1
        with:
          theos-dir: 'theos'

      - name: Compile Tweak Binary
        run: |
          export THEOS=${{ github.workspace }}/theos
          MAKEFILE_PATH=$(find . -name "Makefile" -not -path "*/theos/*" | head -n 1)
          if [ -z "$MAKEFILE_PATH" ]; then
            echo "Error: Makefile not found in repository!"
            exit 1
          fi
          PROJECT_DIR=$(dirname "$MAKEFILE_PATH")
          cd "$PROJECT_DIR"
          make package FINALPACKAGE=1 TARGET=iphone:clang:: PREFIX=

      - name: Upload built .deb
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: "**/packages/*.deb"
